name: 🚀 Feature Request
description: Suggest an idea or enhancement for this project
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        We prioritize features that provide high Enterprise value and follow our Clean Architecture standards.
  - type: textarea
    id: user_story
    attributes:
      label: 👤 User Story
      description: Please provide a description in the "User Story" format.
      placeholder: As a [role], I want [action] so that [benefit].
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: 💰 Enterprise / Business Value
      description: Why is this feature important? Does it affect Multi-tenancy or SLAs?
      placeholder: This feature helps enterprise customers to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 💡 Describe the solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: architectural_impact
    attributes:
      label: 📐 Architectural Impact
      description: Which components or ADRs need updating?
      placeholder: e.g. New Domain Entity, CQRS Command, update to ADR-0003
  - type: textarea
    id: context
    attributes:
      label: 📎 Additional context
      description: Add any other context, designs, or screenshots.
