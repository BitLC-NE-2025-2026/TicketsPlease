name: 🐛 Bug Report
description: Create a report to help us fix an issue
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Please provide as much information as possible to help us investigate.
  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Prerequisites
      description: Please check the following items before submitting your bug report.
      options:
        - label: I have searched for existing issues to avoid duplicates.
          required: true
        - label: I am using the latest version of the application.
          required: true
  - type: textarea
    id: description
    attributes:
      label: 📝 Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 🔄 Steps to Reproduce
      description: How can we reproduce this bug?
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 💡 Expected Behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: environment_dotnet
    attributes:
      label: 🖥️ .NET & Environment
      description: What version of .NET or Visual Studio are you using?
      placeholder: e.g., ASP.NET Core 10.3, C# 14, Visual Studio 2026 / Rider 2026.x
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 💻 Operating System
      description: What operating system are you running on?
      options:
        - Windows
        - macOS
        - Linux
        - Other (please specify in additional context)
  - type: textarea
    id: additional_context
    attributes:
      label: 📎 Screenshots & Additional Context
      description: Add any other context about the problem here, such as screenshots or log outputs.
