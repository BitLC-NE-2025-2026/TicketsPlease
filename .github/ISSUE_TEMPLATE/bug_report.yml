name: 🐛 Bug Report
description: Create a report to help us fix an issue
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        As an Enterprise-grade system, accuracy and detail are paramount.
  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Prerequisites
      description: Please check the following items before submitting.
      options:
        - label: I have searched for existing issues and ADRs.
          required: true
        - label: I am using the latest version (checking `CHANGELOG.md`).
          required: true
        - label: This bug affects a core Enterprise/SaaS feature.
          required: false
  - type: dropdown
    id: impact
    attributes:
      label: ⚡ Business Impact / Severity
      description: How critical is this bug for the operation?
      options:
        - Critical (Production Blocker / Data Loss)
        - Major (Core feature broken, no workaround)
        - Moderate (Feature partially broken, has workaround)
        - Minor (UI/UX polish, non-critical)
    validations:
      required: true
  - type: dropdown
    id: layers
    attributes:
      label: 🏗️ Architectural Layer
      description: Which part of the Clean Architecture is affected?
      options:
        - Domain (Core entities, logic)
        - Application (CQRS, Use Cases)
        - Infrastructure (EF Core, Persistence)
        - Web / UI (Frontend, API Controllers)
        - Cross-Cutting (Logging, Resilience)
  - type: textarea
    id: description
    attributes:
      label: 📝 Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 🔄 Steps to Reproduce
      description: How can we reproduce this bug?
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 💡 Expected Behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: environment_dotnet
    attributes:
      label: 🖥️ .NET & Environment
      description: Versions? (e.g., .NET 10.3, Tailwind 4.2)
      placeholder: e.g., ASP.NET Core 10.x, EF Core 10.x, Rider 2026.x
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: 📎 Screenshots & Logs
      description: Add any other context, such as full stack traces or logs.
