name: 🚀 Feature Request
description: Suggest an idea or enhancement for this project
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        We love new ideas! Please provide as much details as possible about your feature request so we can better understand your vision.
  - type: textarea
    id: problem
    attributes:
      label: 🎯 Is your feature request related to a problem?
      description: Please describe the problem or friction point you are experiencing.
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 💡 Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: I would love to see a feature that...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: context
    attributes:
      label: 📎 Additional context
      description: Add any other context, designs, or screenshots about the feature request here.
